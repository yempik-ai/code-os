<!DOCTYPE html>
<!-- Source for docs/banner.png — render with: chrome --headless --screenshot --window-size=1280,420 -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:420px; }
  .banner {
    width:1280px; height:420px; position:relative; overflow:hidden;
    background:#0A0A0A;
    background-image: radial-gradient(rgba(255,255,255,.045) 1.1px, transparent 1.1px);
    background-size: 26px 26px;
    font-family:'Geist','Helvetica Neue',Arial,sans-serif;
    color:#FAFAF8;
  }
  .motif { position:absolute; right:-20px; top:-10px; height:460px; opacity:.85; }
  .scrim { position:absolute; inset:0; background:linear-gradient(90deg,#0A0A0A 52%, rgba(10,10,11,0) 86%); }
  .content { position:absolute; left:84px; top:0; height:100%; display:flex; flex-direction:column; justify-content:center; z-index:2; }
  .kicker { font-size:15px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:#E35B2D; margin-bottom:22px; }
  .wordmark { display:flex; align-items:flex-end; gap:14px; }
  .wordmark .name { font-size:104px; font-weight:600; letter-spacing:-.035em; line-height:.86; }
  .wordmark .dot { width:22px; height:22px; background:#E35B2D; margin-bottom:14px; border-radius:1px; }
  .sub { font-size:27px; font-weight:500; letter-spacing:-.01em; color:rgba(250,250,248,.92); margin-top:26px; }
  .claim { font-size:17px; font-weight:400; color:rgba(250,250,248,.5); margin-top:12px; max-width:640px; }
  .footer { display:flex; align-items:center; gap:13px; margin-top:34px; }
  .footer .by { font-size:14px; color:rgba(250,250,248,.45); }
  .footer img { height:21px; display:block; }
  .footer .sep { width:1px; height:16px; background:rgba(255,255,255,.16); }
  .footer .tag { font-size:13px; font-weight:500; color:rgba(250,250,248,.6); }
</style>
</head>
<body>
  <div class="banner">
    <img class="motif" src="assets/banner-motif.svg" alt="">
    <div class="scrim"></div>
    <div class="content">
      <div class="kicker">For Claude Code</div>
      <div class="wordmark"><span class="name">code-os</span><span class="dot"></span></div>
      <div class="sub">The engineer's operating system for Claude Code.</div>
      <div class="claim">Make AI coding agents reliable on real work — a drop-in safety &amp; memory harness, a second brain, curated skills, a grounded reference stack.</div>
      <div class="footer">
        <span class="by">built by</span>
        <img src="assets/logo/yempik-wordmark-white.svg" alt="yempik.">
        <span class="sep"></span>
        <span class="tag">open source · MIT</span>
      </div>
    </div>
  </div>
</body>
</html>
